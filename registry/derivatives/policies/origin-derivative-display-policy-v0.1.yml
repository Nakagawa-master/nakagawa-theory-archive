policy_name: origin_derivative_display_policy_v0_1
status: draft_public_spec
purpose: Define how origin article pages and derivatives.ricette.jp divide responsibilities for displaying derivative relationships.
source_of_truth: github_registry
principle:
  origin_site: master.ricette.jp
  derivative_hub: derivatives.ricette.jp
  connection_basis:
    - parent_url
    - parent_ncl_id
    - parent_diff_id
    - derivative_ncl_id
    - derivative_url
core_position:
  - master.ricette.jp remains the origin article site.
  - derivatives.ricette.jp is the derivative hub and connection index.
  - External media such as YouTube, note, Bluesky, X, and other services may host derivative bodies.
  - The derivative hub records and indexes derivative relationships instead of forcing every derivative body into WordPress.
origin_page_display:
  role: lightweight_official_connection_surface
  display_scope:
    - official_or_verified_primary_derivatives
    - latest_or_recommended_derivatives
    - link_to_full_derivative_hub_page
  should_not_display:
    - every_third_party_derivative
    - unresolved_reports
    - unverified_or_risky_external_items
    - bulk_social_post_logs
  reason:
    - keep_origin_article_readable
    - avoid_wordpress_database_bloat
    - avoid_turning_origin_page_into_full_registry
    - preserve_origin_authority
  possible_block_name: connected_derivatives
  minimal_fields:
    - derivative_title
    - derivative_type
    - medium
    - derivative_url
    - derivative_ncl_id
    - status
    - full_index_url
derivative_hub_display:
  role: complete_or_near_complete_derivative_registry_and_index
  display_scope:
    - official_derivatives
    - external_media_derivatives
    - third_party_derivative_records
    - social_post_sets
    - video_and_audio_derivatives
    - note_or_article_derivatives
    - issue_or_deviation_related_links_when_publicly_appropriate
  required_fields:
    - parent_url
    - parent_ncl_id
    - parent_diff_id
    - derivative_ncl_id
    - derivative_type
    - medium
    - derivative_url
    - status
    - relation_to_origin
    - verification_status
third_party_derivatives:
  default_location: derivatives_hub_registry
  origin_page_policy: do_not_show_by_default
  may_show_on_origin_page_when:
    - verified
    - high_value
    - low_risk
    - curator_approved
    - useful_for_readers
  statuses:
    - reported
    - pending_review
    - verified
    - approved
    - disputed
    - rejected
    - archived
display_model:
  origin_page:
    metaphor: article_signature_and_selected_connections
    quantity_policy: small_curated_set
  derivative_hub:
    metaphor: full_connection_map
    quantity_policy: expandable_registry
deviation_ledger_relation:
  position: separate_but_connected_system
  rule:
    - derivative_registry_records_legitimate_or_claimed_derivatives
    - deviation_ledger_records_problematic_misuse_or_suspected_misalignment
    - a derivative_record_may_link_to_deviation_record_when_review_flags_exist
    - a deviation_record_may_link_to_parent_ncl_id_and_related_derivative_url
  origin_page_display:
    - show_only_confirmed_public_deviation_summary_when_approved
    - otherwise_link_to_review_or_report_entry_if_publicly_appropriate
  derivative_hub_display:
    - may_show_status_flags
    - may_show_review_state
    - must_avoid_unverified_accusatory_language
implementation_sequence:
  - keep_current_publication_path_for_derivatives_ricette_jp
  - add_derivative_registry_fields_for_origin_page_display_scope
  - add_origin_page_selected_derivatives_policy_later
  - integrate_deviation_ledger_as_review_flag_not_as_primary_derivative_display
  - do_not_block_cloudflare_pages_pilot_001_on_full_deviation_ledger_automation
blocked_actions:
  - mass_wordpress_derivative_display
  - automatic_display_of_unverified_third_party_derivatives_on_origin_pages
  - accusation_style_public_deviation_listing_without_review
  - search_console_submission_before_public_route_confirmation
fallback:
  if_origin_page_display_not_ready: link_from_origin_to_derivative_hub_later
  if_third_party_review_scale_is_high: keep_full_registry_on_derivative_hub_only
  if_deviation_workflow_not_ready: keep_deviation_links_pending_review
