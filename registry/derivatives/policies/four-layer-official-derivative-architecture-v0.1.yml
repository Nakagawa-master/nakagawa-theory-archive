policy_name: four_layer_official_derivative_architecture_v0_1
status: superseding_architecture_correction
source_of_truth: github_registry
purpose: Correct the placement model for official derivatives after reviewing the semantic relationship between origin articles, official derivatives, external derivatives, and cross-domain ledgers.
reason_for_correction:
  - previous_design_overweighted_cloudflare_pages_and_subdomain_delivery_convenience
  - official_derivatives_should_semantically_belong_under_master_ricette_jp_origin_archive
  - derivatives_ricette_jp_is_better_reserved_for_future_cross_media_or_third_party_derivative_registry
  - pages_dev_should_remain_staging_or_preview_not_canonical_public_route
north_star_alignment:
  - official_archive_is_civilization_os_device
  - origin_articles_must_preserve_authority_and_semantic_center
  - one_article_10000x_plan_requires_derivatives_to_remain_connected_to_parent_ncl_and_parent_diff
  - technical_delivery_must_not_override_semantic_placement
four_layers:
  layer_1_origin_articles:
    location: master.ricette.jp
    role: origin_archive_and_primary_authority
    contains:
      - original_articles
      - ncl_id
      - diff_id
      - origin_signature
      - deviation_ledger_article_block
  layer_2_official_derivatives:
    preferred_canonical_location: master.ricette.jp/derivatives/
    role: official_derivatives_generated_from_origin_articles
    examples:
      - human_summary
      - faq
      - ai_index
      - en_ai_index
      - zh_ai_index
      - future_official_html_derivatives
    relationship: subordinate_to_origin_article_not_parallel_site
  layer_3_external_media_derivatives:
    location_examples:
      - YouTube
      - note
      - Bluesky
      - X
      - NotebookLM
      - other_external_services
    role: media_specific_derivative_outputs
    required_connection:
      - parent_url
      - parent_ncl_id
      - parent_diff_id_when_applicable
      - derivative_ncl_id_when_issued
  layer_4_cross_registry_and_review_systems:
    future_location_candidates:
      - derivatives.ricette.jp
      - github_registry
      - dedicated_registry_interface
    role: cross_media_index_third_party_derivative_registry_and_deviation_review_connection
    includes:
      - external_derivative_index
      - third_party_derivative_records
      - verification_status
      - deviation_ledger_connections
      - review_or_recovery_status
revised_domain_policy:
  master_ricette_jp_derivatives:
    priority: first_candidate_for_official_derivative_public_urls
    rationale:
      - strongest_semantic_fit
      - official_archive_internal_route
      - origin_article_subordination_is_visible
      - search_console_scope_can_remain_close_to_origin_archive
      - avoids_future_migration_if_successful
  nakagawa_derivatives_pages_dev:
    priority: staging_preview_only
    rationale:
      - already_working
      - safe_for_render_testing
      - no_dns_risk
      - not_ideal_as_canonical_public_route
  derivatives_ricette_jp:
    priority: future_cross_registry_candidate
    rationale:
      - useful_for_cross_media_and_third_party_index
      - less_ideal_for_official_derivatives_that_should_belong_under_master_archive
      - dns_and_nameserver_complexity_not_worth_for_pilot_001_official_derivative_pages
blocked_until_revalidated:
  - derivatives_ricette_jp_custom_domain_connection
  - cloudflare_check_dns_records
  - onamae_dns_change
  - nameserver_change
  - pages_dev_canonical_public_adoption
  - noindex_transition
  - search_console_submission
next_validation:
  - confirm_lolipop_public_folder_for_master_ricette_jp
  - test_static_file_route_under_master_ricette_jp_derivatives_test
  - verify_no_wordpress_rewrite_conflict
  - confirm_manual_or_automated_ftp_deploy_path
fallback:
  if_master_derivatives_path_fails: keep_pages_dev_as_staging_and_reconsider_public_route
  if_wordpress_rewrite_conflict_occurs: test_alternate_path_or_server_rule
  if_ftp_deploy_is_too_manual: design_github_actions_or_zapier_ftp_deploy_later
