contract_name: zapier_automation_contract_v0_1
status: draft_public_spec
purpose: Enable Zapier-readable derivative workflows for the 10000x expansion plan.
architecture:
  wordpress: origin_article_only
  github: derivative_registry_and_public_index
  zapier: automation_nervous_system
  openai: derivative_generation_engine
  static_display: external_derivative_display
rules:
  - Do not create derivative contents as new WordPress posts.
  - Do not store derivative bodies in the WordPress post database.
  - Use GitHub as the source of truth for derivative records.
  - Preserve parent_ncl_id and parent_diff_id.
  - Human confirmation is required before external publication.
required_derivative_fields:
  - derivative_ncl_id
  - parent_ncl_id
  - parent_diff_id
  - parent_url
  - derivative_title
  - derivative_type
  - medium
  - target_audience
  - purpose
  - output_format
  - status
  - repository_path
standard_outputs:
  - ja_ai_summary
  - ja_human_summary
  - ja_faq
  - en_ai_summary
  - zh_ai_summary
first_generation:
  trigger: origin_article_registered
  action: create_derivative_queue_item
second_generation:
  trigger: derivative_queue_item_ready
  action: generate_internal_drafts
third_generation:
  trigger: parent_diff_changed
  action: mark_related_derivatives_outdated
