contract_name: automation_stack_v0_1
status: draft_public_spec
purpose: Reduce human workload while expanding each origin article into GitHub-managed derivative assets.
principle: WordPress is origin only. Derivatives are not added as new WordPress posts.
stack:
  zapier:
    role: automation_router
    use: detect_events_and_move_records
  chatgpt:
    role: planning_and_review_interface
    use: design_prompts_review_outputs_and_decide_next_steps
  codex:
    role: repository_editor
    use: create_update_and_refactor_files_in_github_workflows
  github:
    role: source_of_truth
    use: derivative_registry_public_index_and_change_history
  google_drive:
    role: shared_workspace
    use: store_review_docs_exports_and_external_work_materials
  google_sheets:
    role: lightweight_operation_dashboard
    use: queues_status_review_flags_and_publication_candidates
  google_docs:
    role: draft_review_surface
    use: human_readable_review_before_public_release
  google_calendar:
    role: schedule_layer
    use: recurring_reviews_batch_runs_and_manual_checkpoints
  google_ai:
    role: auxiliary_generation_and_research_layer
    use: compare_summarize_translate_and_video_or_document_assist_when_available
workflow_generations:
  generation_1:
    name: origin_detection
    trigger: origin_article_registered_or_updated
    output: derivative_queue_record
  generation_2:
    name: draft_generation
    trigger: queue_record_ready
    output: internal_derivative_drafts
  generation_3:
    name: review_packaging
    trigger: internal_drafts_ready
    output: external_display_candidates
  generation_4:
    name: diff_tracking
    trigger: parent_diff_changed
    output: outdated_derivative_flags
  generation_5:
    name: multilingual_indexing
    trigger: approved_origin_or_derivative
    output: en_and_zh_ai_index_assets
control_rules:
  - Human approval is required before external publication.
  - GitHub records preserve parent_ncl_id and parent_diff_id.
  - Google tools may support workflow, but GitHub remains the source of truth.
  - Automation must reduce human workload, not create manual clutter.
