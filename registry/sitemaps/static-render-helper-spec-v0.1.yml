spec_name: static_render_helper_spec_v0_1
status: draft_public_spec
purpose: Define the minimum helper requirements for converting GitHub-managed derivative markdown files into static HTML candidates.
source_of_truth: github_registry
based_on:
  - registry/sitemaps/static-render-test-plan-v0.1.yml
  - registry/sitemaps/static-hosting-decision-v0.1.yml
  - registry/sitemaps/first-render-output-manifest-v0.1.yml
  - registry/sitemaps/static-output-structure-plan-v0.1.yml
scope:
  stage: helper_spec_only
  code_implementation_status: not_created
  public_deployment_status: not_deployed
  wordpress_status: origin_only
helper_goal:
  - read_public_index_markdown
  - read_render_output_manifest
  - convert_markdown_to_static_html_candidate
  - preserve_required_parent_metadata
  - write_output_to_static_derivatives_directory
  - keep_outputs_out_of_wordpress_database
required_inputs:
  - registry/derivatives/by-parent/{parent_ncl_id_slug}/public-index/*.md
  - registry/sitemaps/first-render-output-manifest-v0.1.yml
  - registry/sitemaps/static-output-structure-plan-v0.1.yml
required_outputs:
  - static/derivatives/{parent_ncl_slug}/{language}/{derivative_type}/index.html
  - optional_render_log
minimum_html_requirements:
  head:
    - title
    - canonical_url_placeholder_or_candidate
    - lang_attribute
  body:
    - derivative_content
    - parent_origin_notice
    - parent_url
    - parent_ncl_id
    - parent_diff_id
    - derivative_type
    - language
    - not_original_article_notice
validation_requirements:
  before_write:
    - source_file_exists
    - output_record_exists_in_manifest
    - parent_metadata_present
    - planned_output_path_matches_structure_plan
  after_write:
    - html_file_created
    - parent_url_present
    - parent_ncl_id_present
    - parent_diff_id_present
    - derivative_notice_present
    - no_wordpress_post_created
recommended_execution_modes:
  local_manual_test:
    status: allowed_for_initial_validation
    purpose: confirm output structure before automation
  github_action:
    status: future_candidate
    purpose: render on repository event after approval
  zapier_triggered_flow:
    status: future_candidate
    purpose: update queue status and request render when ready
  codex_assisted_generation:
    status: allowed
    purpose: create helper script and adjust templates
not_in_scope:
  - cloudflare_project_creation
  - dns_change
  - public_route_activation
  - search_console_submission
  - final_sitemap_generation
  - wordpress_post_creation
fallback:
  if_helper_not_ready: keep_markdown_registry_only
  if_render_validation_fails: do_not_write_public_status
  if_output_metadata_missing: block_render_candidate
next_steps_after_helper_spec:
  - static_render_helper_script_candidate
  - first_render_candidate_generation
  - render_output_manifest_status_update
  - sitemap_candidate_url_update_after_render_confirmation
