plan_name: static_render_test_plan_v0_1
status: draft_public_spec
purpose: Define the first minimal test for rendering GitHub-managed derivative markdown assets into crawlable static HTML without creating WordPress posts.
source_of_truth: github_registry
alignment:
  expansion_goal:
    - 10000x
    - 1000000x
    - 100000000x
  workload_policy: minimize_nakagawa_master_manual_operations
  automation_stack:
    zapier: route_events_and_status_updates
    chatgpt: planning_review_and_decision_support
    codex: repository_editing_support
    github: source_of_truth_for_registry_and_derivatives
    google_sheets: status_mirror_only
    google_docs: human_readable_review_surface
  non_goals:
    - do_not_create_wordpress_posts
    - do_not_upload_by_ftp_in_this_test
    - do_not_submit_to_search_console_in_this_test
    - do_not_generate_final_sitemap_until_rendered_urls_are_confirmed
parent:
  title: Nakagawa OS L1-L7 layer specification
  parent_url: https://master.ricette.jp/theory/nakagawa-master-nakagawa-os-layer-specification-v1/
  parent_ncl_id: NCL-α-20251124-e4c70c
  parent_diff_id: DIFF-20251124-0012
registry_control_file:
  path: registry/derivatives/by-parent/NCL-alpha-20251124-e4c70c/public-index/manifest.md
  purpose: Confirm derivative asset list and parent metadata before rendering.
test_scope:
  scope_type: minimal_single_parent_render_test
  parent_ncl_slug: ncl-alpha-20251124-e4c70c
  input_files:
    - path: registry/derivatives/by-parent/NCL-alpha-20251124-e4c70c/public-index/ja-human-summary.md
      language: ja
      derivative_type: human_summary
      planned_output_url: /derivatives/ncl-alpha-20251124-e4c70c/ja/human-summary/
    - path: registry/derivatives/by-parent/NCL-alpha-20251124-e4c70c/public-index/ja-faq.md
      language: ja
      derivative_type: faq
      planned_output_url: /derivatives/ncl-alpha-20251124-e4c70c/ja/faq/
    - path: registry/derivatives/by-parent/NCL-alpha-20251124-e4c70c/public-index/ja-ai-index.md
      language: ja
      derivative_type: ai_index
      planned_output_url: /derivatives/ncl-alpha-20251124-e4c70c/ja/ai-index/
    - path: registry/derivatives/by-parent/NCL-alpha-20251124-e4c70c/public-index/en-ai-index.md
      language: en
      derivative_type: ai_index
      planned_output_url: /derivatives/ncl-alpha-20251124-e4c70c/en/ai-index/
    - path: registry/derivatives/by-parent/NCL-alpha-20251124-e4c70c/public-index/zh-ai-index.md
      language: zh
      derivative_type: ai_index
      planned_output_url: /derivatives/ncl-alpha-20251124-e4c70c/zh/ai-index/
render_requirements:
  metadata_required_on_each_page:
    - title
    - parent_url
    - parent_ncl_id
    - parent_diff_id
    - derivative_type
    - language
    - canonical_url
    - lastmod
    - status
  footer_required_on_each_page:
    - parent_origin_notice
    - ncl_id_reference
    - diff_id_reference
    - not_original_article_notice
  status_after_successful_test: render_test_passed_candidate
success_conditions:
  - Each rendered candidate page preserves parent_url.
  - Each rendered candidate page preserves parent_ncl_id.
  - Each rendered candidate page preserves parent_diff_id.
  - Each rendered candidate page displays derivative_type and language.
  - Each rendered candidate page includes a notice that it is a derivative index, not the original article.
  - No WordPress post is created.
  - No WordPress database storage is added.
  - No FTP upload occurs during this test definition step.
  - Sitemap remains candidate-only until rendered URLs are confirmed.
  - Human approval remains required before public rendering route activation.
validation_checks:
  before_render:
    - confirm_all_input_files_exist
    - confirm_parent_metadata_matches_manifest
    - confirm_no_secret_values_present
    - confirm_no_wordpress_publication_required
  after_render:
    - confirm_html_pages_are_crawlable_in_selected_host
    - confirm_canonical_url_matches_planned_output_url
    - confirm_parent_metadata_visible_or_machine_readable
    - confirm_sitemap_candidate_can_be_updated_without_internal_registry_paths
fallback:
  if_render_test_fails: keep_registry_only
  if_metadata_missing: block_render
  if_hosting_not_selected: do_not_generate_final_sitemap
  if_automation_unavailable: manual_batch_from_github_registry
  if_google_sheets_unavailable: continue_from_github_registry
next_steps_after_this_plan:
  - static_hosting_candidate_or_decision
  - first_render_output_manifest
  - sitemap_candidate_url_update
  - sitemap_index_draft
  - search_console_submission_candidate
