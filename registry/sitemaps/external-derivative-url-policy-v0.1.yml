policy_name: external_derivative_url_policy_v0_1
status: draft_public_spec
purpose: Define how GitHub registry derivative paths may later become crawlable public URLs.
source_of_truth: github_registry
current_state:
  public_index_location: github_repository_registry
  crawlable_url_status: not_finalized
  wordpress_publication: none
  search_console_submission: none
core_rules:
  - WordPress remains origin only.
  - Derivative assets are not created as new WordPress posts.
  - GitHub registry paths may be indexed internally before public URL hosting is chosen.
  - Sitemap candidates must not be submitted until public URL policy is confirmed.
  - Every external URL must preserve parent_url, parent_ncl_id, and parent_diff_id.
url_policy_options:
  static_hosted_derivative_pages:
    status: preferred_future_option
    description: Render derivative markdown files into static HTML pages outside WordPress post storage.
    sitemap_ready: after_static_url_generation
  github_repository_paths:
    status: registry_reference_only
    description: Public GitHub paths are valid registry references but are not the final SEO sitemap target.
    sitemap_ready: false
  wordpress_pages:
    status: limited_manual_option
    description: Use only for small curated landing pages, not mass derivative storage.
    sitemap_ready: case_by_case
  external_platform_urls:
    status: allowed_when_published
    description: External media or platform URLs may be recorded when publication occurs.
    sitemap_ready: after_url_confirmation
required_metadata_for_final_url:
  - derivative_url
  - parent_url
  - parent_ncl_id
  - parent_diff_id
  - language
  - derivative_type
  - lastmod
  - status
publication_status_flow:
  - registry_prepared
  - url_policy_confirmed
  - static_or_external_url_created
  - sitemap_candidate_updated
  - sitemap_index_generated
  - search_console_submission_candidate
fallback:
  if_hosting_not_ready: keep_registry_candidate_only
  if_static_generation_fails: keep_public_index_and_retry_later
  if_search_console_submission_fails: keep_sitemap_files_available_for_crawlers
