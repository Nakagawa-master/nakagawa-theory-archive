candidate_name: static_hosting_candidate_v0_1
status: draft_public_spec
purpose: Define hosting candidates for rendering GitHub-managed derivative markdown assets into crawlable static HTML while keeping WordPress as origin only.
source_of_truth: github_registry
context:
  previous_step: registry/sitemaps/static-render-test-plan-v0.1.yml
  current_stage: select_static_hosting_candidate_before_first_render_output_manifest
  publication_status: not_deployed
  search_console_status: not_submitted
alignment:
  expansion_goal:
    - 10000x
    - 1000000x
    - 100000000x
  workload_policy: minimize_nakagawa_master_manual_operations
  automation_policy:
    - prefer_git_based_deployments
    - prefer_low_manual_maintenance
    - prefer_zapier_or_github_trigger_compatibility
    - preserve_human_approval_before_public_activation
core_rules:
  - WordPress remains origin only.
  - Derivative pages must not be created as WordPress posts.
  - Rendered pages must preserve parent_url, parent_ncl_id, and parent_diff_id.
  - Sitemap must use rendered public URLs, not internal GitHub registry paths.
  - No secret values, API keys, webhook URLs, or credentials may be stored in this repository.
  - Human approval is required before first public route activation.
recommended_candidate:
  name: cloudflare_pages
  status: preferred_candidate
  reason:
    - static_html_scalability
    - git_based_deployment_possible
    - independent_from_wordpress_database
    - suitable_for_large_derivative_page_sets
  expected_manual_burden: low_after_initial_connection
  risks:
    - initial_account_or_project_setup_required
    - domain_or_subdomain_routing_decision_required
    - build_settings_must_be_confirmed_before_public_activation
fallback_candidates:
  - name: github_pages
    status: acceptable_fallback
    reason:
      - simplest_git_based_static_hosting
      - low_setup_complexity
      - suitable_for_initial_render_proof
    expected_manual_burden: low
    limitations:
      - less_flexible_for_large_multi_route_hosting_than_cloudflare_pages
      - repository_or_branch_structure_may_need_adjustment
  - name: wordpress_static_pages
    status: limited_manual_option
    reason:
      - can be used only for a small curated landing page layer
    expected_manual_burden: medium_to_high
    limitations:
      - avoid_mass_derivative_storage_in_wordpress
      - not_suitable_for_10000x_or_larger_derivative_expansion
  - name: external_platform_urls
    status: allowed_when_individually_published
    reason:
      - useful_for_video_audio_slide_or_external_media_derivatives
    expected_manual_burden: variable
    limitations:
      - not_primary_static_html_registry_host
      - URL confirmation required before sitemap inclusion
hosting_selection_criteria:
  must_have:
    - supports_static_html
    - supports_git_or_automation_driven_updates
    - keeps_wordpress_database_unloaded
    - allows_stable_crawlable_urls
    - can preserve canonical_url_metadata
    - can scale_from_pilot_001_to_many_parent_ncl_ids
  should_have:
    - low_manual_operation_after_setup
    - easy_rollback
    - clear_preview_before_public_release
    - compatible_with_future_sitemap_generation
not_in_scope_for_this_file:
  - actual_cloudflare_project_creation
  - dns_or_domain_change
  - ftp_upload
  - wordpress_post_creation
  - search_console_submission
  - final_sitemap_generation
first_render_path_policy:
  preferred_base_path: /derivatives/
  url_pattern: /derivatives/{parent_ncl_slug}/{language}/{derivative_type}/
  pilot_001_examples:
    - /derivatives/ncl-alpha-20251124-e4c70c/ja/human-summary/
    - /derivatives/ncl-alpha-20251124-e4c70c/ja/faq/
    - /derivatives/ncl-alpha-20251124-e4c70c/ja/ai-index/
    - /derivatives/ncl-alpha-20251124-e4c70c/en/ai-index/
    - /derivatives/ncl-alpha-20251124-e4c70c/zh/ai-index/
approval_gate:
  required_before:
    - connecting_domain_or_subdomain
    - enabling_public_static_route
    - submitting_sitemap_to_search_console
    - moving_candidate_status_to_rendered_public
fallback:
  if_cloudflare_pages_not_ready: use_github_pages_for_proof_or_keep_registry_only
  if_hosting_decision_delayed: continue_preparing_render_output_manifest_without_public_deploy
  if_metadata_missing: block_render_until_fixed
  if_automation_unavailable: manual_batch_from_github_registry
next_steps_after_candidate:
  - static_hosting_decision_v0_1
  - first_render_output_manifest_v0_1
  - sitemap_candidate_url_update
  - sitemap_index_draft
  - search_console_submission_candidate
