decision_name: static_hosting_decision_v0_1
status: draft_public_decision
purpose: Record the first hosting direction for crawlable static derivative HTML generated from GitHub-managed derivative registry assets.
source_of_truth: github_registry
based_on:
  - registry/sitemaps/static-derivative-render-policy-v0.1.yml
  - registry/sitemaps/static-render-test-plan-v0.1.yml
  - registry/sitemaps/static-hosting-candidate-v0.1.yml
decision:
  selected_primary_candidate: cloudflare_pages
  selected_fallback_candidate: github_pages
  wordpress_static_pages: limited_curated_landing_pages_only
  external_platform_urls: allowed_only_when_individually_published_and_confirmed
reasoning:
  primary_candidate_reasons:
    - supports_static_html_at_scale
    - keeps_derivatives_outside_wordpress_database
    - compatible_with_git_based_publication_flow
    - suitable_for_large_derivative_sets_across_many_parent_ncl_ids
    - better_fit_for_10000x_1000000x_100000000x_expansion_than_wordpress_storage
  fallback_candidate_reasons:
    - simple_static_hosting_for_initial_proof
    - low_manual_burden
    - useful_if_cloudflare_setup_is_delayed
manual_workload_policy:
  goal: minimize_nakagawa_master_manual_operations
  acceptable_manual_steps:
    - one_time_hosting_account_or_project_confirmation
    - one_time_domain_or_subdomain_approval
    - final_human_approval_before_public_activation
  avoid:
    - repeated_manual_html_uploads
    - repeated_wordpress_page_creation
    - repeated_ftp_operations
    - manual_sitemap_entry_editing_at_scale
automation_alignment:
  zapier:
    role: route_registry_status_and_publication_readiness_events
  github:
    role: source_of_truth_for_derivative_assets_and_render_manifests
  codex:
    role: create_or_update_registry_files_and_render_helpers
  chatgpt:
    role: plan_review_validate_and_gate_next_steps
  google_sheets:
    role: status_mirror_only_not_source_of_truth
  google_docs:
    role: optional_human_review_surface
activation_limits:
  not_authorized_in_this_decision:
    - create_cloudflare_project
    - connect_domain_or_subdomain
    - change_dns
    - deploy_public_pages
    - submit_search_console
    - generate_final_sitemap_index
    - create_wordpress_posts
required_before_public_activation:
  - confirm_static_render_output_manifest
  - confirm_no_metadata_loss
  - confirm_parent_url_parent_ncl_id_parent_diff_id_preserved
  - confirm_canonical_url_policy
  - confirm_human_approval_gate
  - confirm_rollback_path
pilot_001_target_paths:
  parent_ncl_slug: ncl-alpha-20251124-e4c70c
  planned_urls:
    - /derivatives/ncl-alpha-20251124-e4c70c/ja/human-summary/
    - /derivatives/ncl-alpha-20251124-e4c70c/ja/faq/
    - /derivatives/ncl-alpha-20251124-e4c70c/ja/ai-index/
    - /derivatives/ncl-alpha-20251124-e4c70c/en/ai-index/
    - /derivatives/ncl-alpha-20251124-e4c70c/zh/ai-index/
fallback:
  if_cloudflare_pages_unavailable: use_github_pages_for_initial_render_proof_or_keep_registry_only
  if_domain_decision_pending: render_to_preview_only_or_keep_registry_only
  if_metadata_missing: block_public_activation
  if_automation_unavailable: prepare_manual_batch_from_github_registry_without_wordpress_posts
next_steps_after_decision:
  - first_render_output_manifest_v0_1
  - render_helper_or_static_output_structure_plan
  - sitemap_candidate_url_update
  - sitemap_index_draft
  - search_console_submission_candidate
