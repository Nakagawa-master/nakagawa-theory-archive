request_name: cloudflare_custom_domain_screen_capture_request_v0_1
status: pending_human_screen_capture
source_of_truth: github_registry
purpose: Define the exact screen to capture after starting the custom domain connection flow.
start_from:
  cloudflare_project: nakagawa-derivatives
  current_preview_url: https://nakagawa-derivatives.pages.dev
action_to_take:
  - open_cloudflare_pages_project
  - choose_custom_domains
  - choose_add_custom_domain
  - enter_derivatives_ricette_jp
  - stop_after_next_screen
capture_needed:
  - status_after_entering_domain
  - any_dns_or_cname_instruction
  - any_pending_verification_message
  - any_error_or_warning
  - any_activate_or_continue_button_visible
must_not_click_without_review:
  - dns_record_change
  - cname_change
  - activate_domain_if_unclear
  - remove_noindex
  - final_sitemap
  - search_console
expected_possible_outcomes:
  - automatic_pending_verification
  - cname_instruction_displayed
  - domain_already_on_cloudflare
  - zone_not_found_or_requires_dns_setup
  - domain_active
next_github_record_after_capture:
  - custom_domain_status_v0_1
fallback:
  if_unclear: keep_pages_dev_preview_only
  if_dns_required: ask_before_changing_dns
