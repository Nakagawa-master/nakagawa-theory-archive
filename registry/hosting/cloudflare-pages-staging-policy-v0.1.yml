policy_name: cloudflare_pages_staging_policy_v0_1
status: staging_policy_after_architecture_correction
source_of_truth: github_registry
project:
  cloudflare_pages_project_name: nakagawa-derivatives
  pages_dev_url: https://nakagawa-derivatives.pages.dev
role_after_correction:
  primary_role: staging_preview_and_static_render_validation
  not_primary_role: canonical_public_url_for_official_derivatives
reason:
  - pages_dev_is_technically_successful_and_safe
  - pages_dev_does_not_require_dns_changes
  - pages_dev_is_useful_for_previewing_static_outputs
  - official_derivatives_should_canonically_belong_under_master_ricette_jp_derivatives_if_validation_succeeds
current_allowed_uses:
  - preview_static_html_generation
  - human_review_of_rendered_outputs
  - navigation_testing
  - multilingual_ai_index_testing
  - staging_before_ftp_or_other_public_deploy
current_blocked_uses:
  - final_canonical_public_route
  - search_console_submission_as_final_property
  - sitemap_final_url_basis
  - noindex_transition_to_index_follow
  - public_claim_as_official_archive_route
public_url_priority_after_correction:
  first_candidate: https://master.ricette.jp/derivatives/
  staging_candidate: https://nakagawa-derivatives.pages.dev/
  future_registry_candidate: https://derivatives.ricette.jp/
transition_required_if_master_path_succeeds:
  - update_html_canonical_urls_to_master_ricette_jp_derivatives
  - prepare_ftp_deploy_package
  - keep_pages_dev_noindex_or_staging_only
  - generate_sitemap_candidate_for_master_ricette_jp_derivatives_urls
fallback:
  if_master_path_fails: reconsider_pages_dev_or_derivatives_ricette_jp_public_route
  if_ftp_deploy_is_too_manual: design_automation_later
