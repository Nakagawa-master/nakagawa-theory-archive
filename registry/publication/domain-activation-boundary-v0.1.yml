boundary_name: domain_activation_boundary_v0_1
status: custom_domain_preflight_ready
source_of_truth: github_registry
current_state:
  preview_url: https://nakagawa-derivatives.pages.dev
  preview_verified: true
  return_navigation_verified: true
  custom_domain_candidate: derivatives.ricette.jp
  custom_domain_connected: false
  dns_changed: false
  noindex_nofollow_active: true
  final_sitemap_generated: false
  search_console_action_taken: false
  wordpress_derivative_post_created: false
allowed_next_external_action:
  - add_custom_domain_in_cloudflare_pages_project
custom_domain_target:
  domain: derivatives.ricette.jp
  role: derivative_hub
  origin_site_preserved: master.ricette.jp
blocked_until_custom_domain_screen_review:
  - manual_dns_change
  - cname_change
  - remove_noindex_nofollow
  - mark_rendered_public
  - final_sitemap_generation
  - search_console_action
  - wordpress_derivative_post_creation
required_after_custom_domain_attempt:
  - capture_cloudflare_domain_status_screen
  - record_status_as_pending_or_active_or_error
  - review_dns_instruction_before_action
success_condition_for_next_phase:
  - derivatives_ricette_jp_resolves_to_cloudflare_pages
  - preview_content_loads_on_derivatives_ricette_jp
  - origin_article_links_remain_correct
  - noindex_nofollow_remains_active_until_public_transition_pr
fallback:
  if_domain_setup_is_unclear: keep_pages_dev_preview_only
  if_dns_instruction_requires_manual_change: stop_for_review
  if_domain_fails: do_not_change_search_console_or_sitemap
