policy_name: public_copy_transition_policy_v0_1
status: draft_public_transition_policy
source_of_truth: github_registry
purpose: Define which preview/candidate labels should change when the derivative hub moves from preview to public custom domain.
current_preview_labels:
  - rendered_candidate_not_final_public_launch
  - static_derivative_hub_candidate_managed_through_github
  - noindex_nofollow
transition_required_when:
  - custom_domain_connected
  - dns_confirmed
  - preview_verified
  - public_route_confirmed
  - final_sitemap_scope_reviewed
  - Nakagawa_Master_explicit_approval
public_copy_direction:
  top_label:
    from: rendered_candidate_not_final_public_launch
    to: official_derivative_hub
  footer:
    from: static_derivative_hub_candidate_managed_through_github
    to: official_derivative_hub_managed_by_github_and_connected_to_master_ricette_jp_origin_articles
  robots:
    from: noindex_nofollow
    to: index_follow_or_remove_meta_robots_after_final_review
navigation_requirement_before_public_route:
  - every_parent_index_page_should_link_to_hub_top
  - every_derivative_page_should_link_to_parent_derivative_index
  - every_derivative_page_should_link_to_hub_top
  - every_derivative_page_should_link_to_original_article
blocked_actions:
  - public_copy_transition_before_custom_domain_confirmation
  - noindex_transition_before_public_route_confirmation
  - final_sitemap_generation_before_public_copy_review
fallback:
  if_custom_domain_is_deferred: keep_preview_copy
  if_navigation_is_insufficient: fix_navigation_before_custom_domain_connection
