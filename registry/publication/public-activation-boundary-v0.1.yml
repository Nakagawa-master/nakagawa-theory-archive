boundary_name: public_activation_boundary_v0_1
status: activation_blocker_active
purpose: Define the final checkpoint before any public activation of Pilot 001 static derivative pages.
source_of_truth: github_registry
current_state:
  static_html_candidates: created
  render_output_status: rendered_candidate_registered
  sitemap_index_draft: prepared
  cloudflare_pages_checklist: prepared
  public_route: not_activated
  dns: not_changed
  search_console: not_submitted
  wordpress: origin_only
parent:
  title: Nakagawa OS L1-L7 layer specification
  url: https://master.ricette.jp/theory/nakagawa-master-nakagawa-os-layer-specification-v1/
  ncl_id: NCL-α-20251124-e4c70c
  diff_id: DIFF-20251124-0012
activation_is_blocked_until:
  - nakagawa_master_explicit_approval
  - static_hosting_route_selected
  - canonical_host_confirmed
  - rollback_plan_confirmed
  - final_sitemap_scope_confirmed
  - search_console_submission_scope_confirmed
blocked_actions:
  - connect_cloudflare_pages_project
  - connect_custom_domain_or_subdomain
  - change_dns
  - activate_public_derivative_route
  - publish_final_sitemap_index
  - submit_to_search_console
  - create_wordpress_derivative_posts
allowed_before_activation:
  - review_static_html_candidates
  - review_cloudflare_pages_settings
  - prepare_non_secret_setup_notes
  - prepare_final_sitemap_candidate
  - prepare_search_console_submission_candidate
manual_work_required_if_approved:
  - cloudflare_account_or_project_action
  - domain_or_subdomain_decision
  - search_console_manual_submission_or_approval
fallback:
  if_approval_not_given: keep_rendered_candidate_only
  if_cloudflare_not_ready: keep_registry_and_static_candidates_only
  if_sitemap_scope_unclear: do_not_submit_search_console
  if_any_metadata_missing: block_public_activation
