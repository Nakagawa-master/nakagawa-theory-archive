policy_name: noindex_transition_policy_v0_1
status: preview_safety_policy
source_of_truth: github_registry
purpose: Define when static derivative candidate pages may move from noindex,nofollow to index,follow.
current_state:
  static_candidate_pages: noindex_nofollow
  cloudflare_preview: not_yet_created
  custom_domain: not_connected
  final_sitemap: not_generated
  search_console: not_submitted
why_noindex_now:
  - preview_pages_should_not_be_indexed
  - canonical_public_route_is_not_confirmed
  - derivatives_ricette_jp_is_not_connected_yet
  - final_sitemap_scope_is_not_confirmed
transition_allowed_only_after:
  - cloudflare_preview_verified
  - derivatives_ricette_jp_route_approved
  - custom_domain_connection_confirmed
  - dns_or_cname_confirmed
  - final_sitemap_scope_reviewed
  - nakagawa_master_explicit_approval
transition_method:
  - create_dedicated_github_pr
  - replace_meta_robots_noindex_nofollow_with_index_follow_or_remove_meta_robots
  - update_render_output_status_to_rendered_public
  - generate_final_sitemap_candidate
  - review_before_search_console_action
pages_covered:
  - static/index.html
  - static/derivatives/index.html
  - static/derivatives/ncl-alpha-20251124-e4c70c/index.html
  - static/derivatives/ncl-alpha-20251124-e4c70c/ja/human-summary/index.html
  - static/derivatives/ncl-alpha-20251124-e4c70c/ja/faq/index.html
  - static/derivatives/ncl-alpha-20251124-e4c70c/ja/ai-index/index.html
  - static/derivatives/ncl-alpha-20251124-e4c70c/en/ai-index/index.html
  - static/derivatives/ncl-alpha-20251124-e4c70c/zh/ai-index/index.html
blocked_actions:
  - changing_to_index_follow_before_preview_verification
  - submitting_noindex_pages_to_search_console_as_final
  - generating_final_sitemap_before_public_route_confirmation
fallback:
  if_preview_fails: keep_noindex_nofollow
  if_custom_domain_deferred: keep_noindex_nofollow
  if_metadata_missing: keep_noindex_nofollow_until_fixed
