name: DQ
on:
  push:
    branches:
      - main
    paths:
      - '.deploy/a.txt'
      - '.github/workflows/dq.yml'
permissions:
  contents: read
jobs:
  d:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: guard
        run: |
          test -n "${{ secrets.LOLIPOP_FTP_SERVER }}"
          test -n "${{ secrets.LOLIPOP_FTP_USERNAME }}"
          test -n "${{ secrets.LOLIPOP_FTP_PASSWORD }}"
          test -n "${{ secrets.LOLIPOP_FTP_SERVER_DIR }}"
      - name: d
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.LOLIPOP_FTP_SERVER }}
          username: ${{ secrets.LOLIPOP_FTP_USERNAME }}
          password: ${{ secrets.LOLIPOP_FTP_PASSWORD }}
          local-dir: deploy/lolipop/master-ricette/
          server-dir: ${{ secrets.LOLIPOP_FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
