name: ESTCOND00 boundary v3.1 repair

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/estcond00-boundary-v31-repair-trigger/**'

permissions:
  contents: write

jobs:
  repair-boundary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run boundary repair script
        run: |
          set -euo pipefail
          python3 tools/official_derivatives/repair_estcond00_boundary_v31.py
          python3 tools/official_derivatives/validate_estcond00_v31_entry_quality.py

      - name: Commit repair if changed
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "estcond00_boundary_repair_status=no_changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add deploy/lolipop/master-ricette/derivatives/ultra-quality/establishment-conditions-00/boundary/index.html tools/official_derivatives/estcond00_route_package_manifest.tsv
            git commit -m "Repair ESTCOND00 boundary page for v3.1 quality"
            git push
            echo "estcond00_boundary_repair_status=committed"
          fi
