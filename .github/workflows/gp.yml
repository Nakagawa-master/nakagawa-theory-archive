name: GP
on:
  push:
    branches:
      - main
    paths:
      - '.pages/**'
      - '.github/workflows/gp.yml'
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  p:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.d.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy/lolipop/master-ricette
      - id: d
        uses: actions/deploy-pages@v4
