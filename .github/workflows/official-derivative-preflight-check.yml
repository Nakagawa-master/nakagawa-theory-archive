name: Official derivative preflight check

on:
  pull_request:
    paths:
      - 'tools/official_derivatives/**'
      - 'deploy/lolipop/master-ricette/derivatives/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Run public export preflight
        run: python tools/official_derivatives/check_public_export_preflight.py

      - name: Run entry signal check
        run: python tools/official_derivatives/check_entry_signal.py

      - name: Run candidate boundary doc check
        run: python tools/official_derivatives/check_candidate_boundary_doc.py

      - name: Run release operation manifest check
        run: python tools/official_derivatives/check_release_operation_manifest.py

      - name: Run candidate activation list check
        run: python tools/official_derivatives/check_candidate_activation_list.py
