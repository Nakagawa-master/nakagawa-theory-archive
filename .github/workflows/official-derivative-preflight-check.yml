name: Official derivative preflight check

on:
  pull_request:
    paths:
      - 'tools/official_derivatives/**'
      - 'deploy/lolipop/master-ricette/derivatives/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Run public export preflight
        run: python tools/official_derivatives/check_public_export_preflight.py

      - name: Run entry signal check
        run: python tools/official_derivatives/check_entry_signal.py

      - name: Run candidate boundary doc check
        run: python tools/official_derivatives/check_candidate_boundary_doc.py

      - name: Run PR35 current status check
        run: grep -q 'virtual preparation units: 48' tools/official_derivatives/pr_35_current_status.md

      - name: Run release operation manifest check
        run: python tools/official_derivatives/check_release_operation_manifest.py

      - name: Run candidate activation list check
        run: python tools/official_derivatives/check_candidate_activation_list.py

      - name: Run activation diff plan check
        run: python tools/official_derivatives/check_activation_diff_plan.py

      - name: Run PR35 boundary packet check
        run: python tools/official_derivatives/check_pr35_boundary_packet.py

      - name: Run PR35 boundary decision matrix check
        run: python tools/official_derivatives/check_pr35_boundary_decision_matrix.py

      - name: Run PR35 scope summary check
        run: python tools/official_derivatives/check_pr35_candidate_scope_summary.py

      - name: Run PR35 rank state check
        run: python tools/official_derivatives/check_pr35_prepared_rank_state.py

      - name: Run PR35 rank1 guard table check
        run: python tools/official_derivatives/check_pr35_rank1_guard_table.py

      - name: Run PR35 guard evidence keys check
        run: python tools/official_derivatives/check_pr35_guard_evidence_keys.py

      - name: Run PR35 guard binding count check
        run: python tools/official_derivatives/check_pr35_guard_binding_count.py

      - name: Run PR35 script sequence table check
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path
          path = Path('tools/official_derivatives/pr35_script_sequence.tsv')
          expected = ['rank_state_script', 'rank1_script', 'evidence_keys_script', 'binding_rows_script']
          rows = list(csv.DictReader(path.open(encoding='utf-8'), delimiter='\t'))
          keys = [row['item_key'] for row in rows]
          ranks = [row['sequence_rank'] for row in rows]
          errors = []
          if len(rows) != 4:
              errors.append(f'row_count={len(rows)} expected=4')
          if keys != expected:
              errors.append('item_sequence_mismatch')
          if ranks != ['1', '2', '3', '4']:
              errors.append('rank_sequence_mismatch')
          for row in rows:
              key = row['item_key']
              if row['source_pr'] != '35':
                  errors.append(f'bad_source_pr:{key}')
              if row['state'] != 'present':
                  errors.append(f'bad_state:{key}')
              if row['change_now'] != 'false':
                  errors.append(f'bad_change_now:{key}')
          print('check_set=pr35_script_sequence_table_v1')
          print(f'rows={len(rows)}')
          if errors:
              for error in errors:
                  print(error)
              print('pr35_script_sequence_table_pass=false')
              raise SystemExit(1)
          print('pr35_script_sequence_table_pass=true')
          PY
