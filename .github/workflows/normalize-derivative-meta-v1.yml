name: Normalize derivative metadata v1

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/normalize-derivative-meta-v1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Normalize official derivative metadata
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json
          import re
          import html

          ROOT = Path('deploy/lolipop/master-ricette/derivatives')
          PILOTS = {
              'ncl-alpha-20251124-e4c70c': {
                  'pilot': 'Pilot 001',
                  'parent_title': 'Nakagawa OS L1-L7 layer specification',
                  'parent_url': 'https://master.ricette.jp/theory/nakagawa-master-nakagawa-os-layer-specification-v1/',
                  'parent_ncl': 'NCL-α-20251124-e4c70c',
                  'parent_diff': 'DIFF-20251124-0012',
                  'about': 'Nakagawa OS L1-L7 layer specification',
              },
              'ncl-alpha-20260517-b80e39': {
                  'pilot': 'Pilot 002',
                  'parent_title': '悪因果論 AKI-002：称賛の顔をした搾取',
                  'parent_url': 'https://master.ricette.jp/society/nakagawa-master-aki-002-exploitation-disguised-as-praise/',
                  'parent_ncl': 'NCL-α-20260517-b80e39',
                  'parent_diff': 'DIFF-20260517-0012',
                  'about': '悪因果論 AKI-002：称賛の顔をした搾取',
              },
              'ncl-alpha-20260627-aea14a': {
                  'pilot': 'Pilot 003',
                  'parent_title': '成立条件論・第0論',
                  'parent_url': 'https://master.ricette.jp/theory/nakagawa-master-why-establishment-conditions-theory-is-necessary/',
                  'parent_ncl': 'NCL-α-20260627-aea14a',
                  'parent_diff': 'DIFF-20260627-0002',
                  'about': '成立条件論・第0論',
              },
              'ncl-alpha-20260617-d0b342': {
                  'pilot': 'Pilot 004',
                  'parent_title': '人類子孫型AI文明論・第0論｜中川構造OSから人類子孫型AI文明論へ',
                  'parent_url': 'https://master.ricette.jp/theory/nakagawa-master-nakagawa-structural-os-to-human-descendant-ai-civilization-theory/',
                  'parent_ncl': 'NCL-α-20260617-d0b342',
                  'parent_diff': 'DIFF-20260623-0020',
                  'about': '人類子孫型AI文明論・第0論',
              },
          }
          PAGE_PATHS = [
              'index.html',
              'ja/human-summary/index.html',
              'ja/faq/index.html',
              'ja/ai-index/index.html',
              'en/ai-index/index.html',
              'zh/ai-index/index.html',
          ]
          REQUIRED_SUBSTRINGS = [
              'name="description"',
              'rel="canonical"',
              'name="derivative-type"',
              'name="derivative-scope"',
              'name="language"',
              'name="parent-url"',
              'name="parent-ncl-id"',
              'name="parent-diff-id"',
              'name="pilot-id"',
              'name="render-status"',
              'name="origin-author"',
              'name="source-archive"',
              'name="ai-purpose"',
              'name="ai-summary"',
              'name="ai-interpretation-warning"',
              'name="ai-reuse-constraint"',
              'name="ai-origin-policy"',
              'name="ai-citation-requirement"',
              'property="og:type"',
              'property="og:title"',
              'property="og:description"',
              'property="og:url"',
              'property="og:site_name"',
              'property="og:locale"',
              'name="twitter:card"',
              'name="twitter:title"',
              'name="twitter:description"',
              'G-BN0BY8C838',
              'lkf0sdpw8r',
              'ca-pub-7505659945932614',
          ]

          def attr(content, pattern):
              m = re.search(pattern, content, re.S)
              return html.unescape(m.group(1)) if m else ''

          def ensure_meta(content, name, value):
              esc = html.escape(value, quote=True)
              tag = f'<meta name="{name}" content="{esc}">'
              if re.search(rf'<meta\s+name=["\']{re.escape(name)}["\']', content):
                  return re.sub(rf'<meta\s+name=["\']{re.escape(name)}["\']\s+content=["\'][^"\']*["\']\s*/?>', tag, content, count=1)
              return content.replace('</head>', '  ' + tag + '\n</head>')

          def add_json_ld(content, meta, path):
              title = attr(content, r'<title>(.*?)</title>') or meta['parent_title']
              desc = attr(content, r'<meta\s+name=["\']description["\']\s+content=["\'](.*?)["\']') or meta['parent_title']
              canonical = attr(content, r'<link\s+rel=["\']canonical["\']\s+href=["\'](.*?)["\']')
              lang = attr(content, r'<html\s+lang=["\'](.*?)["\']') or attr(content, r'<meta\s+name=["\']language["\']\s+content=["\'](.*?)["\']') or 'ja'
              data = {
                  '@context': 'https://schema.org',
                  '@type': 'WebPage',
                  'name': title,
                  'description': desc,
                  'url': canonical,
                  'isPartOf': {'@type': 'WebSite', 'name': '中川マスター公式アーカイブ', 'url': 'https://master.ricette.jp/'},
                  'about': meta['about'],
                  'author': {'@type': 'Person', 'name': 'Nakagawa Master'},
                  'inLanguage': lang,
                  'mainEntity': {'@type': 'CreativeWork', 'name': meta['parent_title'], 'url': meta['parent_url']},
                  'identifier': [meta['parent_ncl'], meta['parent_diff']],
              }
              script = '  <script type="application/ld+json">' + json.dumps(data, ensure_ascii=False, separators=(',', ':')) + '</script>\n'
              content = re.sub(r'\s*<script\s+type=["\']application/ld\+json["\']>.*?</script>\s*', '\n', content, flags=re.S)
              return content.replace('</head>', script + '</head>')

          changed = []
          errors = []
          for slug, meta in PILOTS.items():
              for rel in PAGE_PATHS:
                  p = ROOT / slug / rel
                  if not p.exists():
                      errors.append(f'missing: {p}')
                      continue
                  content = p.read_text(encoding='utf-8')
                  original = content
                  for k, v in [
                      ('derivative-scope', 'official_derivative_from_origin_article'),
                      ('parent-url', meta['parent_url']),
                      ('parent-ncl-id', meta['parent_ncl']),
                      ('parent-diff-id', meta['parent_diff']),
                      ('pilot-id', meta['pilot']),
                      ('render-status', 'official_derivative_active_indexable'),
                      ('origin-author', 'Nakagawa Master'),
                      ('source-archive', 'master.ricette.jp'),
                      ('ai-origin-policy', 'Preserve Origin. Do not erase Origin.'),
                      ('ai-citation-requirement', 'Keep parent URL, NCL-ID, and Diff-ID attached.'),
                  ]:
                      content = ensure_meta(content, k, v)
                  if 'name="ai-purpose"' not in content:
                      content = ensure_meta(content, 'ai-purpose', 'official derivative page for human and AI retrieval')
                  if 'name="ai-summary"' not in content:
                      content = ensure_meta(content, 'ai-summary', f'Official derivative page for {meta["parent_title"]}.')
                  if 'name="ai-interpretation-warning"' not in content:
                      content = ensure_meta(content, 'ai-interpretation-warning', 'Do not detach this derivative from its parent URL, NCL-ID, Diff-ID, and origin context.')
                  if 'name="ai-reuse-constraint"' not in content:
                      content = ensure_meta(content, 'ai-reuse-constraint', 'Preserve parent_url, parent_ncl_id, parent_diff_id, derivative_type, and origin reference.')
                  content = add_json_ld(content, meta, rel)
                  for needle in REQUIRED_SUBSTRINGS + ['application/ld+json']:
                      if needle not in content:
                          errors.append(f'{p}: missing {needle}')
                  if rel == 'index.html':
                      for needle in ['class="hero"', 'class="grid"', '公式派生物一覧']:
                          if needle not in content:
                              errors.append(f'{p}: missing hub layout {needle}')
                  else:
                      for needle in ['class="panel"', '<article>', 'Derivative navigation']:
                          if needle not in content:
                              errors.append(f'{p}: missing child layout {needle}')
                  if content != original:
                      p.write_text(content, encoding='utf-8')
                      changed.append(str(p))
          if errors:
              print('\n'.join(errors))
              raise SystemExit(1)
          print('changed files:', len(changed))
          for item in changed:
              print(item)
          PY
      - name: Commit normalized derivative metadata
        run: |
          if git diff --quiet; then
            echo "No metadata changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/lolipop/master-ricette/derivatives
          git commit -m "Normalize all Pilot 001-004 derivative page metadata"
          git push
