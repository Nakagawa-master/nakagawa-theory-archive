name: check public derivative leakage

on:
  workflow_dispatch:
  push:
    paths:
      - 'derivatives/**/*.md'
      - 'tools/official_derivatives/check_public_derivative_leakage.py'
      - '.github/workflows/check-public-derivative-leakage.yml'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check public derivative leakage
        run: python3 tools/official_derivatives/check_public_derivative_leakage.py
      - name: Commit leakage report
        if: always()
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add derivatives/public-derivative-leakage-report.json || true
          git commit -m record-public-derivative-leakage-check || true
          git push || true
