name: Official derivative generation check

on:
  pull_request:
    paths:
      - 'tools/official_derivatives/**'
      - 'deploy/lolipop/master-ricette/derivatives/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  candidate-generation-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Generate candidate 05-09 pages
        run: python tools/official_derivatives/generate_candidate_05_09_html.py

      - name: Validate template parity
        run: python tools/official_derivatives/validate_template_parity.py --status=staged

      - name: Validate head metadata
        run: python tools/official_derivatives/render_heads.py --status=staged

      - name: Validate promotion readiness
        run: python tools/official_derivatives/validate_promotion_ready.py

      - name: Check manifest freshness
        run: python tools/official_derivatives/check_manifest_fresh.py

      - name: Summarize derivative batch
        run: python tools/official_derivatives/build_batch_summary.py

      - name: Run listing guard
        run: python tools/official_derivatives/check_staged_listing.py

      - name: Commit generated pages and reports to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260511-e243be \
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260416-0b1b93 \
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260418-11c3d8 \
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260607-7e87f5 \
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260613-007d94 \
            tools/official_derivatives/candidate_05_09_gate_report.md
          if git diff --cached --quiet; then
            echo "No generated page or report changes to commit."
          else
            git commit -m "Generate candidate 05-09 derivative pages and gate report"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      - name: Upload generated pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: official-derivatives-candidate-05-09
          path: |
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260511-e243be
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260416-0b1b93
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260418-11c3d8
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260607-7e87f5
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260613-007d94
            tools/official_derivatives/candidate_05_09_gate_report.md
          if-no-files-found: error
