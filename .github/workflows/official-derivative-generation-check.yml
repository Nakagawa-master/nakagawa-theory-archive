name: Official derivative generation check

on:
  pull_request:
    paths:
      - 'tools/official_derivatives/**'
      - 'deploy/lolipop/master-ricette/derivatives/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  candidate-generation-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Generate candidate 05-09 pages
        run: python tools/official_derivatives/generate_candidate_05_09_universal.py

      - name: Generate candidate 10-17 pages
        run: python tools/official_derivatives/generate_candidate_10_17_universal.py

      - name: Validate candidate generator core parity
        run: python tools/official_derivatives/check_candidate_generator_core_parity.py

      - name: Validate template parity
        run: python tools/official_derivatives/validate_template_parity.py --status=staged

      - name: Validate head metadata
        run: python tools/official_derivatives/render_heads.py --status=staged

      - name: Validate universal renderer contract
        run: python tools/official_derivatives/check_universal_renderer_contract.py

      - name: Validate universal page renderer
        run: python tools/official_derivatives/check_universal_page_renderer.py

      - name: Validate change scope
        run: python tools/official_derivatives/check_change_scope.py

      - name: Validate origin manifest
        run: python tools/official_derivatives/validate_origin_manifest.py

      - name: Validate staged boundary
        run: python tools/official_derivatives/validate_staged_boundary.py

      - name: Validate promotion readiness
        run: python tools/official_derivatives/validate_promotion_ready.py

      - name: Check manifest freshness
        run: python tools/official_derivatives/check_manifest_fresh.py

      - name: Summarize derivative batch
        run: python tools/official_derivatives/build_batch_summary.py

      - name: Run listing guard
        run: python tools/official_derivatives/check_staged_listing.py

      - name: Validate candidate 10-19 public origin discovery
        run: python tools/official_derivatives/check_next_10_public_origin_discovery.py

      - name: Validate candidate 10-19 verified origin overlay
        run: python tools/official_derivatives/check_next_10_verified_origin_overlay.py

      - name: Validate candidate 10-19 content blueprint
        run: python tools/official_derivatives/check_next_10_content_blueprint.py

      - name: Validate candidate 10-19 content value spec
        run: python tools/official_derivatives/check_next_10_content_value_spec.py

      - name: Validate candidate 10-19 value readiness
        run: python tools/official_derivatives/check_next_10_value_ready.py

      - name: Validate candidate 10-19 template gate count
        run: python tools/official_derivatives/check_next_10_template_gate_count.py

      - name: Validate candidate 10-19 body skeleton gate
        run: python tools/official_derivatives/check_next_10_body_skeleton_gate.py

      - name: Validate candidate 10-19 body quality table
        run: |
          table=tools/official_derivatives/next_10_body_generation_quality_gate_candidate_10_19.tsv
          test "$(wc -l < "$table")" -eq 7
          grep -q 'structural_rationality' "$table"
          grep -q 'origin_fidelity' "$table"
          grep -q 'parent_ncl_id' "$table"
          awk -F '\t' 'NR>1 && ($8 != "false" || $9 != "false" || $10 != "false") { exit 1 }' "$table"

      - name: Validate priority effect bundle matrix
        run: python tools/official_derivatives/check_priority_effect_bundle_matrix.py

      - name: Validate candidate 05-09 effect bundles
        run: python tools/official_derivatives/check_candidate_05_09_effect_bundles.py

      - name: Build candidate 10-17 materialized unit ledgers
        run: python tools/official_derivatives/build_candidate_10_17_effect_unit_ledgers.py

      - name: Validate candidate 10-17 materialized unit ledgers
        run: python tools/official_derivatives/check_candidate_10_17_materialized_unit_ledgers.py

      - name: Validate staged effect materialization
        run: python tools/official_derivatives/check_staged_effect_materialization.py

      - name: Commit generated pages and reports to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260511-e243be \
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260416-0b1b93 \
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260418-11c3d8 \
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260607-7e87f5 \
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260613-007d94 \
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260512-1202e0 \
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260513-4e76d3 \
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260517-fe6641 \
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260518-f38a1e \
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260211-051ce0 \
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260214-40c1de \
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260215-198686 \
            deploy/lolipop/master-ricette/derivatives/ncl-alpha-20260227-4ecc69 \
            tools/official_derivatives/derivative_registry_candidate_05_09.tsv \
            tools/official_derivatives/staged_official_derivative_registry.tsv \
            tools/official_derivatives/candidate_05_09_gate_report.md \
            tools/official_derivatives/staged_official_derivative_gate_report.md \
            tools/official_derivatives/effect_bundles/staged_effect_expansion_summary.tsv \
            tools/official_derivatives/effect_bundles/candidate_10_17_materialized_unit_ledger.tsv \
            tools/official_derivatives/effect_bundles/candidate_10_17_materialized_quote_units.tsv \
            tools/official_derivatives/effect_bundles/candidate_10_17_materialized_social_units.tsv \
            tools/official_derivatives/effect_bundles/candidate_10_17_materialized_clarification_units.tsv \
            tools/official_derivatives/effect_bundles/candidate_10_17_materialized_notebooklm_units.tsv \
            tools/official_derivatives/effect_bundles/candidate_10_17_materialized_unit_summary.tsv
          if git diff --cached --quiet; then
            echo "No generated page, report, or effect ledger changes to commit."
          else
            git commit -m "Generate staged derivative pages and effect ledgers"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi
