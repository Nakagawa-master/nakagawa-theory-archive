name: expand origin fulltext targets

on:
  workflow_dispatch:
  push:
    paths:
      - 'tools/origin_fulltext/build_targets_from_derivatives.py'
      - '.github/top/expand-origin-fulltext-targets-trigger.txt'

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Expand targets
        run: python3 tools/origin_fulltext/build_targets_from_derivatives.py
      - name: Commit targets
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add origin-fulltext/origin-fulltext-targets.json
          git commit -m record-expanded-origin-fulltext-targets || true
          git push || true
