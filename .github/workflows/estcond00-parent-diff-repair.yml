name: ESTCOND00 parent Diff repair

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/estcond00-parent-diff-repair-trigger/**'

permissions:
  contents: write

jobs:
  repair-parent-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repair remaining ESTCOND00 public shelf files
        run: python tools/official_derivatives/repair_estcond00_parent_diff_remaining.py

      - name: Validate repaired parent Diff values
        shell: bash
        run: |
          set -euo pipefail
          ROOT="deploy/lolipop/master-ricette/derivatives/ultra-quality/establishment-conditions-00"
          grep -R "DIFF-20260627-0002" "$ROOT/ai-index/index.html"
          grep -R "DIFF-20260627-0002" "$ROOT/application/index.html"
          grep -R "DIFF-20260627-0002" "$ROOT/origin/index.html"
          ! grep -R "DIFF-20260630-0003" "$ROOT/ai-index/index.html" "$ROOT/application/index.html" "$ROOT/origin/index.html"
          grep -R "NCL-α-20260627-aea14a" "$ROOT"
          grep -R "NCL-DER-20260704-estcond00-0001" "$ROOT"
          grep -R "DIFF-DER-20260704-0001" "$ROOT"

      - name: Update ESTCOND00 route package manifest
        run: python tools/official_derivatives/update_estcond00_route_manifest_after_parent_diff_repair.py

      - name: Commit repair if needed
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            deploy/lolipop/master-ricette/derivatives/ultra-quality/establishment-conditions-00/ai-index/index.html \
            deploy/lolipop/master-ricette/derivatives/ultra-quality/establishment-conditions-00/application/index.html \
            deploy/lolipop/master-ricette/derivatives/ultra-quality/establishment-conditions-00/origin/index.html \
            tools/official_derivatives/estcond00_route_package_manifest.tsv
          if git diff --cached --quiet; then
            echo "No ESTCOND00 parent Diff repair changes to commit."
          else
            git commit -m "Repair ESTCOND00 public shelf parent Diff IDs"
            git push origin HEAD:${{ github.ref_name }}
          fi
