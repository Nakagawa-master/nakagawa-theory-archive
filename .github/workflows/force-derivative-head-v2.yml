name: Force derivative head v2

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/force-derivative-head-v2.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  force-head:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rewrite every Pilot 001-004 derivative head block
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re, html, json

          ROOT = Path('deploy/lolipop/master-ricette/derivatives')
          PILOT_DIRS = [
            'ncl-alpha-20251124-e4c70c',
            'ncl-alpha-20260517-b80e39',
            'ncl-alpha-20260627-aea14a',
            'ncl-alpha-20260617-d0b342',
          ]
          PAGE_PATHS = [
            'index.html',
            'ja/human-summary/index.html',
            'ja/faq/index.html',
            'ja/ai-index/index.html',
            'en/ai-index/index.html',
            'zh/ai-index/index.html',
          ]
          REQUIRED = [
            'name="description"','rel="canonical"','name="derivative-type"','name="derivative-scope"','name="language"',
            'name="parent-url"','name="parent-ncl-id"','name="parent-diff-id"','name="pilot-id"','name="render-status"',
            'name="origin-author"','name="source-archive"','name="ai-purpose"','name="ai-summary"','name="ai-interpretation-warning"',
            'name="ai-reuse-constraint"','name="ai-origin-policy"','name="ai-citation-requirement"','property="og:type"',
            'property="og:title"','property="og:description"','property="og:url"','property="og:site_name"','property="og:locale"',
            'name="twitter:card"','name="twitter:title"','name="twitter:description"','G-BN0BY8C838','lkf0sdpw8r',
            'ca-pub-7505659945932614','application/ld+json'
          ]

          def h(v): return html.escape(v or '', quote=True)
          def one(pattern, text, default=''):
            m = re.search(pattern, text, re.S|re.I)
            return html.unescape(m.group(1)) if m else default
          def meta(name, text, default=''):
            return one(r'<meta\s+name=["\']' + re.escape(name) + r'["\']\s+content=["\'](.*?)["\']', text, default)
          def prop(name, text, default=''):
            return one(r'<meta\s+property=["\']' + re.escape(name) + r'["\']\s+content=["\'](.*?)["\']', text, default)
          def link_canon(text):
            return one(r'<link\s+rel=["\']canonical["\']\s+href=["\'](.*?)["\']', text)
          def style(text):
            m = re.search(r'<style>.*?</style>', text, re.S|re.I)
            return m.group(0) if m else '<style>body{font-family:system-ui;line-height:1.85;margin:0;background:#f8faf9;color:#1f2933}.wrap{max-width:900px;margin:0 auto;padding:48px 24px}</style>'
          def lang_from(path, text):
            if '/en/' in str(path): return 'en'
            if '/zh/' in str(path): return 'zh'
            return meta('language', text, one(r'<html\s+lang=["\'](.*?)["\']', text, 'ja'))
          def locale(lang): return {'ja':'ja_JP','en':'en_US','zh':'zh_CN'}.get(lang,'ja_JP')
          def page_type(rel, text):
            if rel == 'index.html': return 'official_derivative_hub'
            return meta('derivative-type', text, 'ai_index' if 'ai-index' in rel else 'human_summary')
          def page_purpose(dtype, rel):
            if dtype == 'official_derivative_hub': return 'official derivative hub for human and AI retrieval'
            if dtype == 'human_summary': return 'official human summary for human and AI retrieval'
            if dtype == 'faq': return 'official FAQ for human and AI retrieval'
            if rel.startswith('en/'): return 'official English AI index for retrieval and interpretation'
            if rel.startswith('zh/'): return 'official Chinese AI index for retrieval and interpretation'
            return 'official Japanese AI index for retrieval and interpretation'
          def make_head(path, rel, text):
            title = one(r'<title>(.*?)</title>', text, 'Official derivative')
            desc = meta('description', text, title)
            canon = link_canon(text)
            dtype = page_type(rel, text)
            lang = lang_from(path, text)
            parent_url = meta('parent-url', text)
            parent_ncl = meta('parent-ncl-id', text)
            parent_diff = meta('parent-diff-id', text)
            pilot = meta('pilot-id', text)
            ai_summary = meta('ai-summary', text, desc)
            ai_warning = meta('ai-interpretation-warning', text, 'Preserve the parent article context and do not flatten this derivative into a generic summary.')
            ai_reuse = meta('ai-reuse-constraint', text, 'Preserve parent_url, parent_ncl_id, parent_diff_id, derivative_type, and origin reference.')
            parent_title = one(r'<p>原典: <a [^>]+>(.*?)</a>', text, title)
            og_site = prop('og:site_name', text, '中川マスター公式アーカイブ')
            data = {'@context':'https://schema.org','@type':'WebPage','name':title,'description':desc,'url':canon,'isPartOf':{'@type':'WebSite','name':'中川マスター公式アーカイブ','url':'https://master.ricette.jp/'},'about':parent_title,'author':{'@type':'Person','name':'Nakagawa Master'},'inLanguage':lang,'mainEntity':{'@type':'CreativeWork','name':parent_title,'url':parent_url},'identifier':[parent_ncl,parent_diff],'isBasedOn':parent_url}
            return '\n'.join([
              '<head>','  <meta charset="utf-8">','  <meta name="viewport" content="width=device-width, initial-scale=1">','  <meta name="robots" content="index,follow">',
              f'  <title>{h(title)}</title>',f'  <meta name="description" content="{h(desc)}">',f'  <link rel="canonical" href="{h(canon)}">',
              f'  <meta name="derivative-type" content="{h(dtype)}">','  <meta name="derivative-scope" content="official_derivative_from_origin_article">',f'  <meta name="language" content="{h(lang)}">',
              f'  <meta name="parent-url" content="{h(parent_url)}">',f'  <meta name="parent-ncl-id" content="{h(parent_ncl)}">',f'  <meta name="parent-diff-id" content="{h(parent_diff)}">',f'  <meta name="pilot-id" content="{h(pilot)}">',
              '  <meta name="render-status" content="official_derivative_active_indexable">','  <meta name="origin-author" content="Nakagawa Master">','  <meta name="source-archive" content="master.ricette.jp">',
              f'  <meta name="ai-purpose" content="{h(page_purpose(dtype, rel))}">',f'  <meta name="ai-summary" content="{h(ai_summary)}">',f'  <meta name="ai-interpretation-warning" content="{h(ai_warning)}">',f'  <meta name="ai-reuse-constraint" content="{h(ai_reuse)}">',
              '  <meta name="ai-origin-policy" content="Preserve Origin. Do not erase Origin. Do not detach this derivative from its parent article.">','  <meta name="ai-citation-requirement" content="Keep parent URL, NCL-ID, and Diff-ID attached.">',
              '  <meta property="og:type" content="article">',f'  <meta property="og:title" content="{h(title)}">',f'  <meta property="og:description" content="{h(desc)}">',f'  <meta property="og:url" content="{h(canon)}">',f'  <meta property="og:site_name" content="{h(og_site)}">',f'  <meta property="og:locale" content="{h(locale(lang))}">',
              '  <meta name="twitter:card" content="summary">',f'  <meta name="twitter:title" content="{h(title)}">',f'  <meta name="twitter:description" content="{h(desc)}">','  '+style(text),
              '  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BN0BY8C838"></script>',"  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-BN0BY8C838');</script>",
              "  <script type=\"text/javascript\">(function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a]||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src='https://www.clarity.ms/tag/'+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);})(window,document,'clarity','script','lkf0sdpw8r');</script>",
              '  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7505659945932614" crossorigin="anonymous"></script>',
              '  <script type="application/ld+json">'+json.dumps(data, ensure_ascii=False, separators=(',',':'))+'</script>','</head>'
            ])

          changed=[]; errors=[]
          for slug in PILOT_DIRS:
            for rel in PAGE_PATHS:
              p = ROOT/slug/rel
              if not p.exists(): errors.append(f'missing {p}'); continue
              text = p.read_text(encoding='utf-8')
              new = re.sub(r'<head>.*?</head>', make_head(p, rel, text), text, count=1, flags=re.S|re.I)
              for needle in REQUIRED:
                if needle not in new: errors.append(f'{p}: missing {needle}')
              if rel == 'index.html':
                for needle in ['class="hero"','class="grid"','公式派生物一覧']:
                  if needle not in new: errors.append(f'{p}: missing {needle}')
              else:
                for needle in ['class="panel"','<article>','Derivative navigation']:
                  if needle not in new: errors.append(f'{p}: missing {needle}')
              if new != text:
                p.write_text(new, encoding='utf-8'); changed.append(str(p))
          if errors:
            print('\n'.join(errors)); raise SystemExit(1)
          print('rewritten pages', len(changed))
          print('\n'.join(changed))
          PY
      - name: Commit rewritten heads
        run: |
          if git diff --quiet; then
            echo "No head rewrite changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/lolipop/master-ricette/derivatives
          git commit -m "Rewrite all Pilot 001-004 derivative heads with unified metadata"
          git push
