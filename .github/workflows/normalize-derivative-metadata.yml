name: Normalize Derivative Metadata

on:
  push:
    branches: [main]
    paths:
      - tools/official_derivatives/normalize_derivative_metadata_display.py
      - tools/official_derivatives/repair_derivative_metadata_titles.py
      - tools/official_derivatives/normalize_navigation_and_public_shelf.py
      - .github/workflows/normalize-derivative-metadata.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python tools/official_derivatives/normalize_derivative_metadata_display.py
      - run: python tools/official_derivatives/repair_derivative_metadata_titles.py
      - run: python tools/official_derivatives/normalize_navigation_and_public_shelf.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Normalize official derivative metadata display 001-010
          file_pattern: derivatives/*.md derivatives/0*/*.md derivatives/reports/*.md
